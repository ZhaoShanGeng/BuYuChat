<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuYu</title>
    <!-- 引入 Notebook 主题所需的 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <!-- 在首次绘制前同步应用主题，防止闪烁 -->
    <script>
      (function () {
        var mode = "system";
        try { mode = localStorage.getItem("buyu-theme") || "system"; } catch (e) {}
        var dark = mode === "dark" || (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        /* Notebook Theme Light Splash */
        --splash-bg: hsl(34 33% 96%); /* FAF7F2 */
        --splash-fg: hsl(15 10% 22%); /* 3D3330 */
        --splash-sub: hsl(30 9% 45%); /* 7F7368 */
        --splash-dot: hsl(15 46% 53%); /* C4654A */
        --splash-dot-glow: hsl(15 46% 53% / 0.18);
        --splash-gradient-a: hsl(34 33% 94%);
        --splash-gradient-b: hsl(34 33% 96%);
      }

      .dark {
        color-scheme: dark;
        /* Notebook Theme Dark Splash */
        --splash-bg: hsl(24 18% 9%); /* 1A1512 */
        --splash-fg: hsl(32 30% 86%); /* E8DFD2 */
        --splash-sub: hsl(32 16% 55%); /* A89B8C */
        --splash-dot: hsl(13 60% 60%); /* D4785E */
        --splash-dot-glow: hsl(13 60% 60% / 0.15);
        --splash-gradient-a: hsl(24 18% 7%);
        --splash-gradient-b: hsl(24 18% 9%);
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--splash-bg);
        color: var(--splash-fg);
      }

      body { min-height: 100vh; }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, var(--splash-gradient-a), transparent),
          var(--splash-gradient-b);
        transition: opacity 300ms ease, visibility 300ms ease;
      }

      #boot-splash.boot-splash--hide {
        opacity: 0;
        visibility: hidden;
      }

      .splash-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .splash-title {
        margin: 0;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -0.05em;
        color: var(--splash-fg);
        opacity: 0;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 80ms forwards;
      }

      .splash-subtitle {
        margin: 10px 0 0;
        font-size: 13px;
        font-weight: 400;
        color: var(--splash-sub);
        letter-spacing: 0.02em;
        opacity: 0;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
      }

      .splash-dots {
        display: flex;
        gap: 6px;
        margin-top: 32px;
        opacity: 0;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 350ms forwards;
      }

      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--splash-dot);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }

      .splash-dot:nth-child(2) { animation-delay: 0.15s; }
      .splash-dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes splash-fade-up {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes splash-pulse {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.35);
          box-shadow: 0 0 0 4px var(--splash-dot-glow);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="splash-brand">
        <h1 class="splash-title">BuYu</h1>
        <p class="splash-subtitle">正在准备工作台</p>
        <div class="splash-dots">
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

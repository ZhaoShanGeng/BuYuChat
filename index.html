<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuYu</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: hsl(0 0% 100%);
        color: hsl(240 10% 3.9%);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, hsl(210 40% 98%), transparent 42%),
          linear-gradient(180deg, hsl(0 0% 100%), hsl(220 20% 98%));
      }

      body {
        min-height: 100vh;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, hsl(210 40% 98%), transparent 42%),
          linear-gradient(180deg, hsl(0 0% 100%), hsl(220 20% 98%));
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      #boot-splash.boot-splash--hide {
        opacity: 0;
        visibility: hidden;
      }

      .boot-card {
        width: min(420px, 100%);
        border: 1px solid hsl(220 13% 91%);
        border-radius: 24px;
        background: hsl(0 0% 100% / 0.88);
        box-shadow: 0 24px 64px hsl(220 40% 12% / 0.08);
        backdrop-filter: blur(12px);
        padding: 28px 28px 24px;
      }

      .boot-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 6px 12px;
        background: hsl(210 40% 96%);
        font-size: 12px;
        color: hsl(215 16% 47%);
      }

      .boot-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: hsl(217 91% 60%);
        box-shadow: 0 0 0 6px hsl(217 91% 60% / 0.12);
      }

      .boot-title {
        margin: 18px 0 8px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .boot-copy {
        margin: 0;
        color: hsl(215 14% 34%);
        line-height: 1.6;
        font-size: 14px;
      }

      .boot-progress {
        margin-top: 20px;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: hsl(210 30% 94%);
      }

      .boot-progress::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, hsl(221 83% 53%), hsl(199 89% 48%));
        animation: boot-progress 1.1s ease-in-out infinite;
      }

      @keyframes boot-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-card">
        <div class="boot-badge">启动中</div>
        <h1 class="boot-title">BuYu</h1>
        <p class="boot-copy">正在准备会话、模型和工作台界面。</p>
        <div class="boot-progress"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

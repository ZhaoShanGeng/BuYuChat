[package]
name = "buyu"
version = "0.1.0"
description = "Minimal Tauri v2 shell for the BuYu workspace"
authors = ["Admin"]
edition = "2021"
default-run = "buyu"

[lib]
name = "buyu_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.1", features = [] }

[dependencies]
tauri = { version = "2.10.3", features = [] }

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      has_apple: ${{ steps.detect.outputs.has_apple }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect committed Apple mobile project
        id: detect
        shell: bash
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            echo "has_apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify tag and manifest version
        if: github.event_name == 'push'
        run: node scripts/version.mjs check --tag "${{ github.ref_name }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend checks
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: buyu-web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build bundle (${{ matrix.label }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - label: windows
            runner: windows-latest
            kind: desktop
            bundle_args: --bundles nsis
            artifact_name: buyu-windows-installer
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - label: linux
            runner: ubuntu-22.04
            kind: desktop
            bundle_args: --bundles appimage,deb
            artifact_name: buyu-linux-bundles
            artifact_paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - label: macos
            runner: macos-latest
            kind: desktop
            bundle_args: --bundles dmg
            artifact_name: buyu-macos-bundles
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: android
            runner: ubuntu-22.04
            kind: android
            artifact_name: buyu-android-apk
            artifact_paths: |
              src-tauri/gen/android/app/build/outputs/apk/**/*.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        if: matrix.kind != 'android'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust toolchain for Android
        if: matrix.kind == 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        if: matrix.kind == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        if: matrix.kind == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04' && matrix.kind == 'desktop'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        if: matrix.kind == 'desktop'
        run: pnpm tauri build --ci -c src-tauri/tauri.github-release.conf.json -- ${{ matrix.bundle_args }}

      - name: Initialize Android target
        if: matrix.kind == 'android'
        run: pnpm tauri android init --ci

      - name: Build Android APK
        if: matrix.kind == 'android'
        run: pnpm tauri android build --ci --apk -c src-tauri/tauri.github-release.conf.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 7

  ios:
    name: Build bundle (ios)
    if: ${{ needs.build-frontend.outputs.has_apple == 'true' }}
    needs: build-frontend
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS bundle
        run: pnpm tauri ios build --ci -c src-tauri/tauri.github-release.conf.json

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: buyu-ios-ipa
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success' && (needs.ios.result == 'success' || needs.ios.result == 'skipped') }}
    needs: [build, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          mapfile -t files < <(find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.apk" -o \
            -name "*.ipa" \
          \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were produced."
            exit 1
          fi

          printf 'files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.files }}
          name: BuYu ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

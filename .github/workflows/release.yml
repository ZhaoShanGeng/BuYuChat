name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update, for example v0.1.0
        required: false
        type: string
      publish_release:
        description: Publish artifacts to GitHub Releases
        required: true
        default: true
        type: boolean
      build_windows:
        description: Build Windows bundles
        required: true
        default: true
        type: boolean
      build_linux:
        description: Build Linux bundles
        required: true
        default: true
        type: boolean
      build_macos:
        description: Build macOS bundles
        required: true
        default: true
        type: boolean
      build_android:
        description: Build Android APKs
        required: true
        default: true
        type: boolean
      build_ios:
        description: Build iOS artifacts
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      any_builds: ${{ steps.plan.outputs.any_builds }}
      build_android: ${{ steps.plan.outputs.build_android }}
      build_ios: ${{ steps.plan.outputs.build_ios }}
      desktop_matrix: ${{ steps.plan.outputs.desktop_matrix }}
      android_matrix: ${{ steps.plan.outputs.android_matrix }}
      has_desktop: ${{ steps.plan.outputs.has_desktop }}
      has_apple: ${{ steps.plan.outputs.has_apple }}
      publish_release: ${{ steps.plan.outputs.publish_release }}
      release_tag: ${{ steps.plan.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release plan
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          INPUT_BUILD_WINDOWS: ${{ inputs.build_windows }}
          INPUT_BUILD_LINUX: ${{ inputs.build_linux }}
          INPUT_BUILD_MACOS: ${{ inputs.build_macos }}
          INPUT_BUILD_ANDROID: ${{ inputs.build_android }}
          INPUT_BUILD_IOS: ${{ inputs.build_ios }}
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            has_apple=true
          else
            has_apple=false
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            release_tag="$REF_NAME"
            publish_release=true
            build_windows=true
            build_linux=true
            build_macos=true
            build_android=true
            build_ios="$has_apple"
          else
            release_tag="${INPUT_RELEASE_TAG:-}"
            publish_release="${INPUT_PUBLISH_RELEASE:-false}"
            build_windows="${INPUT_BUILD_WINDOWS:-false}"
            build_linux="${INPUT_BUILD_LINUX:-false}"
            build_macos="${INPUT_BUILD_MACOS:-false}"
            build_android="${INPUT_BUILD_ANDROID:-false}"
            build_ios="${INPUT_BUILD_IOS:-false}"
          fi

          if [ "$publish_release" = "true" ] && [ -z "$release_tag" ]; then
            echo "workflow_dispatch with publish_release=true requires release_tag" >&2
            exit 1
          fi

          if [ "$build_ios" = "true" ] && [ "$has_apple" != "true" ]; then
            echo "iOS build selected but src-tauri/gen/apple is not committed" >&2
            exit 1
          fi

          desktop_items=()
          if [ "$build_windows" = "true" ]; then
            desktop_items+=('{"label":"windows-x64","runner":"windows-latest","rust_target":"x86_64-pc-windows-msvc","bundles":"nsis","artifact_name":"buyu-windows-x64","artifact_paths":"src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe"}')
            desktop_items+=('{"label":"windows-arm64","runner":"windows-11-arm","rust_target":"aarch64-pc-windows-msvc","bundles":"nsis","artifact_name":"buyu-windows-arm64","artifact_paths":"src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe"}')
          fi
          if [ "$build_linux" = "true" ]; then
            desktop_items+=('{"label":"linux-x64","runner":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu","bundles":"appimage,deb","artifact_name":"buyu-linux-x64","artifact_paths":"src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage\nsrc-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb"}')
            desktop_items+=('{"label":"linux-arm64","runner":"ubuntu-22.04-arm","rust_target":"aarch64-unknown-linux-gnu","bundles":"appimage,deb","artifact_name":"buyu-linux-arm64","artifact_paths":"src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage\nsrc-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb"}')
          fi
          if [ "$build_macos" = "true" ]; then
            desktop_items+=('{"label":"macos-x64","runner":"macos-15-intel","rust_target":"x86_64-apple-darwin","bundles":"dmg","artifact_name":"buyu-macos-x64","artifact_paths":"src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"}')
            desktop_items+=('{"label":"macos-arm64","runner":"macos-latest","rust_target":"aarch64-apple-darwin","bundles":"dmg","artifact_name":"buyu-macos-arm64","artifact_paths":"src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"}')
          fi

          android_items=()
          if [ "$build_android" = "true" ]; then
            android_items+=('{"label":"arm64","tauri_target":"aarch64","rust_target":"aarch64-linux-android","artifact_name":"buyu-android-arm64"}')
            android_items+=('{"label":"armv7","tauri_target":"armv7","rust_target":"armv7-linux-androideabi","artifact_name":"buyu-android-armv7"}')
            android_items+=('{"label":"x86_64","tauri_target":"x86_64","rust_target":"x86_64-linux-android","artifact_name":"buyu-android-x86_64"}')
            android_items+=('{"label":"x86","tauri_target":"i686","rust_target":"i686-linux-android","artifact_name":"buyu-android-x86"}')
          fi

          desktop_joined=""
          if [ "${#desktop_items[@]}" -gt 0 ]; then
            desktop_joined=$(printf ',%s' "${desktop_items[@]}")
            desktop_joined="[${desktop_joined:1}]"
            has_desktop=true
          else
            desktop_joined="[]"
            has_desktop=false
          fi

          android_joined=""
          if [ "${#android_items[@]}" -gt 0 ]; then
            android_joined=$(printf ',%s' "${android_items[@]}")
            android_joined="[${android_joined:1}]"
          else
            android_joined="[]"
          fi

          any_builds=false
          if [ "$has_desktop" = "true" ] || [ "$build_android" = "true" ] || [ "$build_ios" = "true" ]; then
            any_builds=true
          fi

          if [ "$any_builds" != "true" ]; then
            echo "At least one platform must be selected" >&2
            exit 1
          fi

          printf 'release_tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"
          printf 'publish_release=%s\n' "$publish_release" >> "$GITHUB_OUTPUT"
          printf 'has_apple=%s\n' "$has_apple" >> "$GITHUB_OUTPUT"
          printf 'build_android=%s\n' "$build_android" >> "$GITHUB_OUTPUT"
          printf 'build_ios=%s\n' "$build_ios" >> "$GITHUB_OUTPUT"
          printf 'has_desktop=%s\n' "$has_desktop" >> "$GITHUB_OUTPUT"
          printf 'any_builds=%s\n' "$any_builds" >> "$GITHUB_OUTPUT"
          printf 'desktop_matrix={"include":%s}\n' "$desktop_joined" >> "$GITHUB_OUTPUT"
          printf 'android_matrix={"include":%s}\n' "$android_joined" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build Frontend
    needs: plan
    if: ${{ needs.plan.outputs.any_builds == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify tag and manifest version
        if: ${{ needs.plan.outputs.publish_release == 'true' }}
        run: node scripts/version.mjs check --tag "${{ needs.plan.outputs.release_tag }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend checks
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: buyu-web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build-desktop:
    name: Build bundle (${{ matrix.label }})
    needs: [plan, build-frontend]
    if: ${{ needs.plan.outputs.has_desktop == 'true' }}
    runs-on: ${{ matrix.runner }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.plan.outputs.desktop_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm tauri build --ci -c src-tauri/tauri.github-release.conf.json --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 7

  prepare-android:
    name: Prepare Android project
    needs: [plan, build-frontend]
    if: ${{ needs.plan.outputs.build_android == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android target
        run: pnpm tauri android init --ci

      - name: Pack Android project
        shell: bash
        run: tar -czf android-project.tgz -C src-tauri/gen android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: buyu-android-project
          path: android-project.tgz
          if-no-files-found: error
          retention-days: 1

  build-android:
    name: Build bundle (android-${{ matrix.label }})
    needs: [plan, build-frontend, prepare-android]
    if: ${{ needs.plan.outputs.build_android == 'true' }}
    runs-on: ubuntu-22.04
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.plan.outputs.android_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android signing secrets
        shell: bash
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.label }}
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: buyu-android-project
          path: .

      - name: Restore Android project
        shell: bash
        run: |
          mkdir -p src-tauri/gen
          tar -xzf android-project.tgz -C src-tauri/gen

      - name: Build Android APK
        run: pnpm tauri android build --ci --apk -c src-tauri/tauri.github-release.conf.json --target ${{ matrix.tauri_target }}

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-upload-keystore.jks

      - name: Sign Android APK
        shell: bash
        run: |
          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "Android build-tools directory not found" >&2
            exit 1
          fi

          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          mapfile -t apks < <(find src-tauri/gen/android/app/build/outputs/apk -type f \( -name "*-release-unsigned.apk" -o -name "*-unsigned.apk" \) | sort)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No unsigned APKs found to sign" >&2
            exit 1
          fi

          for apk in "${apks[@]}"; do
            aligned="${apk%.apk}-aligned.apk"
            signed="${apk%-unsigned.apk}-signed.apk"

            "$ZIPALIGN" -f -p 4 "$apk" "$aligned"
            "$APKSIGNER" sign \
              --ks android-upload-keystore.jks \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$signed" \
              "$aligned"
            "$APKSIGNER" verify --verbose "$signed"
            rm -f "$aligned"
          done

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*-signed.apk
          if-no-files-found: error
          retention-days: 7

  ios:
    name: Build bundle (ios)
    if: ${{ needs.plan.outputs.build_ios == 'true' && needs.plan.outputs.has_apple == 'true' }}
    needs: [plan, build-frontend]
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ios
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS bundle
        run: pnpm tauri ios build --ci -c src-tauri/tauri.github-release.conf.json

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: buyu-ios-ipa
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    if: ${{ needs.plan.outputs.publish_release == 'true' && (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped') && (needs.prepare-android.result == 'success' || needs.prepare-android.result == 'skipped') && (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') && (needs.ios.result == 'success' || needs.ios.result == 'skipped') }}
    needs: [plan, build-desktop, prepare-android, build-android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          mapfile -t files < <(find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.apk" -o \
            -name "*.ipa" \
          \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were produced."
            exit 1
          fi

          printf 'files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.files }}
          name: BuYu ${{ needs.plan.outputs.release_tag }}
          tag_name: ${{ needs.plan.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(needs.plan.outputs.release_tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

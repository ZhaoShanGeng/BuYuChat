name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      has_apple: ${{ steps.detect.outputs.has_apple }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect committed Apple mobile project
        id: detect
        shell: bash
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            echo "has_apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify tag and manifest version
        if: github.event_name == 'push'
        run: node scripts/version.mjs check --tag "${{ github.ref_name }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend checks
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: buyu-web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build-desktop:
    name: Build bundle (${{ matrix.label }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_name: buyu-windows-x64
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - label: windows-arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            bundles: nsis
            artifact_name: buyu-windows-arm64
            artifact_paths: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - label: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            artifact_name: buyu-linux-x64
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            artifact_name: buyu-linux-arm64
            artifact_paths: |
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          - label: macos-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            bundles: dmg
            artifact_name: buyu-macos-x64
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macos-arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg
            artifact_name: buyu-macos-arm64
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm tauri build --ci -c src-tauri/tauri.github-release.conf.json --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 7

  prepare-android:
    name: Prepare Android project
    needs: build-frontend
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android target
        run: pnpm tauri android init --ci

      - name: Pack Android project
        shell: bash
        run: tar -czf android-project.tgz -C src-tauri/gen android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: buyu-android-project
          path: android-project.tgz
          if-no-files-found: error
          retention-days: 1

  build-android:
    name: Build bundle (android-${{ matrix.label }})
    needs: [build-frontend, prepare-android]
    runs-on: ubuntu-22.04
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - label: arm64
            tauri_target: aarch64
            rust_target: aarch64-linux-android
            artifact_name: buyu-android-arm64
          - label: armv7
            tauri_target: armv7
            rust_target: armv7-linux-androideabi
            artifact_name: buyu-android-armv7
          - label: x86_64
            tauri_target: x86_64
            rust_target: x86_64-linux-android
            artifact_name: buyu-android-x86_64
          - label: x86
            tauri_target: i686
            rust_target: i686-linux-android
            artifact_name: buyu-android-x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android signing secrets
        shell: bash
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.label }}
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: buyu-android-project
          path: .

      - name: Restore Android project
        shell: bash
        run: |
          mkdir -p src-tauri/gen
          tar -xzf android-project.tgz -C src-tauri/gen

      - name: Build Android APK
        run: pnpm tauri android build --ci --apk -c src-tauri/tauri.github-release.conf.json --target ${{ matrix.tauri_target }}

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-upload-keystore.jks

      - name: Sign Android APK
        shell: bash
        run: |
          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "Android build-tools directory not found" >&2
            exit 1
          fi

          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          mapfile -t apks < <(find src-tauri/gen/android/app/build/outputs/apk -type f \( -name "*-release-unsigned.apk" -o -name "*-unsigned.apk" \) | sort)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No unsigned APKs found to sign" >&2
            exit 1
          fi

          for apk in "${apks[@]}"; do
            aligned="${apk%.apk}-aligned.apk"
            signed="${apk%-unsigned.apk}-signed.apk"

            "$ZIPALIGN" -f -p 4 "$apk" "$aligned"
            "$APKSIGNER" sign \
              --ks android-upload-keystore.jks \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$signed" \
              "$aligned"
            "$APKSIGNER" verify --verbose "$signed"
            rm -f "$aligned"
          done

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*-signed.apk
          if-no-files-found: error
          retention-days: 7

  ios:
    name: Build bundle (ios)
    if: ${{ needs.build-frontend.outputs.has_apple == 'true' }}
    needs: build-frontend
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: buyu-web-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ios
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS bundle
        run: pnpm tauri ios build --ci -c src-tauri/tauri.github-release.conf.json

      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats || true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: buyu-ios-ipa
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-desktop.result == 'success' && needs.prepare-android.result == 'success' && needs.build-android.result == 'success' && (needs.ios.result == 'success' || needs.ios.result == 'skipped') }}
    needs: [build-desktop, prepare-android, build-android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          mapfile -t files < <(find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.apk" -o \
            -name "*.ipa" \
          \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were produced."
            exit 1
          fi

          printf 'files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.files }}
          name: BuYu ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

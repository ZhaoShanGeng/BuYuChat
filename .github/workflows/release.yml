name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-mobile:
    name: Detect Mobile Targets
    runs-on: ubuntu-latest
    outputs:
      has_apple: ${{ steps.detect.outputs.has_apple }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect committed Apple mobile project
        id: detect
        shell: bash
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            echo "has_apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple=false" >> "$GITHUB_OUTPUT"
          fi

  gates:
    name: Release Gates
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and manifest version
        if: github.event_name == 'push'
        run: node scripts/version.mjs check --tag "${{ github.ref_name }}"

      - name: Run release gates
        run: pnpm verify

  desktop:
    name: Desktop Build (${{ matrix.label }})
    needs: gates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - label: windows
            os: windows-latest
            bundle_args: --bundles nsis
            artifact_name: buyu-windows-installer
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*-setup.exe
          - label: linux
            os: ubuntu-22.04
            bundle_args: --bundles appimage,deb
            artifact_name: buyu-linux-bundles
            artifact_paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - label: macos
            os: macos-latest
            bundle_args: --bundles dmg
            artifact_name: buyu-macos-bundles
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundles
        run: pnpm tauri build -- ${{ matrix.bundle_args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 7

  android:
    name: Android Build
    needs: gates
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android target
        run: pnpm tauri android init --ci

      - name: Build Android APK
        run: pnpm tauri android build --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buyu-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7

  ios:
    name: iOS Build
    if: needs.detect-mobile.outputs.has_apple == 'true'
    needs: [detect-mobile, gates]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS bundle
        run: pnpm tauri ios build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buyu-ios-ipa
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release Assets
    if: github.event_name == 'push' && needs.desktop.result == 'success' && needs.android.result == 'success' && (needs.ios.result == 'success' || needs.ios.result == 'skipped')
    needs: [desktop, android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          mapfile -t files < <(find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.apk" -o \
            -name "*.ipa" \
          \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were produced."
            exit 1
          fi

          printf 'files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.files }}
          name: BuYu ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

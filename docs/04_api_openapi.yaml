openapi: "3.0.3"
info:
  title: BuYu Internal API
  version: "0.2.0"
  description: |
    BuYu 桌面客户端内部接口。底层为 Tauri IPC 命令。
    前端 Transport 层将 REST 路径映射为 invoke() 调用。
    无鉴权（本地单用户桌面应用）。

tags:
  - name: channels
    description: 渠道管理（AI 服务商接入配置）
  - name: models
    description: 模型管理（渠道下的模型列表）
  - name: agents
    description: Agent 管理（含系统提示词）
  - name: conversations
    description: 会话管理
  - name: messages
    description: 消息查询与版本管理
  - name: generation
    description: AI 生成控制（发送、Reroll、取消）

paths:

  # ═══════════════════════════════════════════════
  # 渠道管理
  # ═══════════════════════════════════════════════

  /channels:
    get:
      operationId: list_channels
      tags: [channels]
      summary: 获取渠道列表
      parameters:
        - name: include_disabled
          in: query
          schema:
            type: boolean
            default: true
          description: 是否包含禁用渠道
      responses:
        "200":
          description: 渠道列表（按 created_at 降序）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"

    post:
      operationId: create_channel
      tags: [channels]
      summary: 创建渠道
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelInput"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          $ref: "#/components/responses/BadRequest"

  /channels/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: get_channel
      tags: [channels]
      summary: 获取单个渠道
      responses:
        "200":
          description: 渠道详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: update_channel
      tags: [channels]
      summary: 部分更新渠道（只发送需要修改的字段）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelInput"
      responses:
        "200":
          description: 更新后的渠道
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: delete_channel
      tags: [channels]
      summary: 删除渠道
      description: |
        级联删除渠道下所有模型。
        引用该渠道的 conversations.channel_id 和 channel_model_id 置为 NULL。
      responses:
        "204":
          description: 删除成功
        "404":
          $ref: "#/components/responses/NotFound"

  /channels/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: test_channel
      tags: [channels]
      summary: 测试渠道连通性
      description: 向渠道的 models_endpoint 发送请求，验证 API Key 和网络是否正常
      responses:
        "200":
          description: 连通性测试结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelTestResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/ChannelUnreachable"

  # ═══════════════════════════════════════════════
  # 模型管理
  # ═══════════════════════════════════════════════

  /channels/{channelId}/models:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: list_models
      tags: [models]
      summary: 获取渠道下的模型列表
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelModel"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: create_model
      tags: [models]
      summary: 在渠道下添加模型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelInput"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelModel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /channels/{channelId}/models/{id}:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
      - $ref: "#/components/parameters/ResourceId"

    patch:
      operationId: update_model
      tags: [models]
      summary: 更新模型信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateModelInput"
      responses:
        "200":
          description: 更新后的模型
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelModel"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: delete_model
      tags: [models]
      summary: 删除模型（引用该模型的会话 channel_model_id 置 NULL）
      responses:
        "204":
          description: 删除成功
        "404":
          $ref: "#/components/responses/NotFound"

  /channels/{channelId}/models/fetch:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: fetch_remote_models
      tags: [models]
      summary: 从渠道 API 拉取可用模型列表（不写库）
      responses:
        "200":
          description: 远程模型列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteModelInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: 远程渠道访问失败（`error_code` 可能为 `CHANNEL_UNREACHABLE` 或 `AI_REQUEST_FAILED`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ═══════════════════════════════════════════════
  # Agent 管理
  # ═══════════════════════════════════════════════

  /agents:
    get:
      operationId: list_agents
      tags: [agents]
      summary: 获取 Agent 列表
      parameters:
        - name: include_disabled
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Agent 列表（按 created_at 降序）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

    post:
      operationId: create_agent
      tags: [agents]
      summary: 创建 Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentInput"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          $ref: "#/components/responses/BadRequest"

  /agents/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: get_agent
      tags: [agents]
      summary: 获取单个 Agent
      responses:
        "200":
          description: Agent 详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: update_agent
      tags: [agents]
      summary: 部分更新 Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentInput"
      responses:
        "200":
          description: 更新后的 Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: delete_agent
      tags: [agents]
      summary: 删除 Agent（引用该 Agent 的会话 agent_id 置 NULL）
      responses:
        "204":
          description: 删除成功
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════
  # 会话管理
  # ═══════════════════════════════════════════════

  /conversations:
    get:
      operationId: list_conversations
      tags: [conversations]
      summary: 获取会话列表
      parameters:
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
          description: true=归档列表，false=活跃列表
      responses:
        "200":
          description: 会话列表（置顶优先，再按 updated_at 降序）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"

    post:
      operationId: create_conversation
      tags: [conversations]
      summary: 创建会话
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: get_conversation
      tags: [conversations]
      summary: 获取会话详情（含绑定配置）
      responses:
        "200":
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: update_conversation
      tags: [conversations]
      summary: 部分更新会话（标题/绑定/归档/置顶）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationInput"
      responses:
        "200":
          description: 更新后的会话
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: delete_conversation
      tags: [conversations]
      summary: 删除会话（级联删除所有消息）
      responses:
        "204":
          description: 删除成功
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════
  # 消息查询与版本管理
  # ═══════════════════════════════════════════════

  /conversations/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: list_messages
      tags: [messages]
      summary: 获取会话消息列表
      description: |
        返回所有 node 及其全部 versions，按 order_key 升序。
        前端用 activeVersionId 决定展示哪一个。
        MVP 不分页；预留 before_order_key 参数供后续扩展。
      parameters:
        - name: before_order_key
          in: query
          required: false
          schema:
            type: string
          description: 游标分页（P1），返回 order_key 小于此值的消息
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
          description: 最大返回 node 数量（P1）
      responses:
        "200":
          description: 消息节点列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageNode"
        "404":
          $ref: "#/components/responses/NotFound"

  /conversations/{id}/nodes/{nodeId}/active-version:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"

    put:
      operationId: set_active_version
      tags: [messages]
      summary: 切换楼层的当前展示版本（立即写库）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id:
                  type: string
      responses:
        "200":
          description: 切换成功
        "400":
          description: version_id 不属于该 node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/responses/NotFound"

  /conversations/{id}/nodes/{nodeId}/versions/{versionId}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"
      - $ref: "#/components/parameters/VersionId"

    delete:
      operationId: delete_version
      tags: [messages]
      summary: 删除指定版本
      description: |
        generating 版本会先自动取消再删除。
        唯一版本则连同 node 一起删除。
        若为 active version，自动切换到同 node 最新的其他版本。
      responses:
        "200":
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVersionResult"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════
  # 版本内容按需加载
  # ═══════════════════════════════════════════════

  /versions/{versionId}/content:
    parameters:
      - $ref: "#/components/parameters/VersionId"

    get:
      operationId: get_version_content
      tags: [messages]
      summary: 按需加载指定版本的完整内容
      description: |
        拼接该版本的所有 content chunks 返回。
        用于版本切换时加载非 active 版本的内容。
      responses:
        "200":
          description: 版本内容
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionContent"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════
  # AI 生成控制
  # ═══════════════════════════════════════════════

  /conversations/{id}/send:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    post:
      operationId: send_message
      tags: [generation]
      summary: 发送用户消息并触发 AI 生成
      description: |
        立即返回创建好的 node/version ID。
        生成过程通过 Tauri Channel 事件推送。
        通过 stream 参数控制流式/非流式。
        通过 dry_run 参数仅返回 prompt 调试信息。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "200":
          description: 消息已创建，生成已启动（或 dry_run 返回调试信息）
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SendMessageResult"
                  - $ref: "#/components/schemas/DryRunResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: 业务规则不满足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/nodes/{nodeId}/reroll:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"

    post:
      operationId: reroll
      tags: [generation]
      summary: 对指定楼层执行 Reroll
      description: |
        assistant node: 新建版本重新生成。
        user node（任意楼层均可）: 复制当前 active version 内容为新 user version，
        然后创建新 assistant node 开始生成。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerollInput"
      responses:
        "200":
          description: Reroll 已触发
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerollResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: 业务规则不满足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /generations/{versionId}/cancel:
    parameters:
      - $ref: "#/components/parameters/VersionId"

    post:
      operationId: cancel_generation
      tags: [generation]
      summary: 取消生成（幂等）
      description: version 不存在或已终结时同样返回 200
      responses:
        "200":
          description: 取消成功或已终结

components:

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 资源 UUID v7

    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string

    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: 入参校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: 唯一约束冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ChannelUnreachable:
      description: 渠道连通性测试失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:

    # ─── 错误 ───

    ApiError:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          description: 机器可读错误码，前端用于 i18n
        message:
          type: string
          description: 英文调试信息

    # ─── 渠道 ───

    Channel:
      type: object
      required: [id, name, channel_type, base_url, enabled, created_at, updated_at]
      properties:
        id:               { type: string }
        name:             { type: string }
        channel_type:     { type: string, example: openai_compatible }
        base_url:         { type: string, example: "https://api.openai.com" }
        api_key:          { type: string, nullable: true }
        auth_type:        { type: string, nullable: true, enum: [bearer, x_api_key, none] }
        models_endpoint:  { type: string, nullable: true }
        chat_endpoint:    { type: string, nullable: true }
        stream_endpoint:  { type: string, nullable: true }
        enabled:          { type: boolean }
        created_at:       { type: integer, description: "Unix ms" }
        updated_at:       { type: integer }

    CreateChannelInput:
      type: object
      required: [name, base_url]
      properties:
        name:             { type: string, minLength: 1 }
        channel_type:     { type: string, default: openai_compatible }
        base_url:         { type: string, pattern: "^https?://" }
        api_key:          { type: string, nullable: true }
        auth_type:        { type: string, nullable: true }
        models_endpoint:  { type: string, nullable: true }
        chat_endpoint:    { type: string, nullable: true }
        stream_endpoint:  { type: string, nullable: true }

    UpdateChannelInput:
      type: object
      description: 所有字段可选，只发送需要修改的
      properties:
        name:             { type: string, minLength: 1 }
        base_url:         { type: string, pattern: "^https?://" }
        api_key:          { type: string, nullable: true }
        auth_type:        { type: string, nullable: true }
        models_endpoint:  { type: string, nullable: true }
        chat_endpoint:    { type: string, nullable: true }
        stream_endpoint:  { type: string, nullable: true }
        enabled:          { type: boolean }

    ChannelTestResult:
      type: object
      required: [success]
      properties:
        success:          { type: boolean }
        message:          { type: string, nullable: true, description: "成功时的状态消息" }

    # ─── 模型 ───

    ChannelModel:
      type: object
      required: [id, channel_id, model_id]
      properties:
        id:               { type: string }
        channel_id:       { type: string }
        model_id:         { type: string }
        display_name:     { type: string, nullable: true }
        context_window:   { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }

    CreateModelInput:
      type: object
      required: [model_id]
      properties:
        model_id:         { type: string, minLength: 1 }
        display_name:     { type: string, nullable: true }
        context_window:   { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }

    UpdateModelInput:
      type: object
      properties:
        display_name:     { type: string, nullable: true }
        context_window:   { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }

    RemoteModelInfo:
      type: object
      required: [model_id]
      properties:
        model_id:         { type: string }
        display_name:     { type: string, nullable: true }
        context_window:   { type: integer, nullable: true }

    # ─── Agent ───

    Agent:
      type: object
      required: [id, name, enabled, created_at, updated_at]
      properties:
        id:               { type: string }
        name:             { type: string }
        system_prompt:    { type: string, nullable: true }
        avatar_uri:       { type: string, nullable: true }
        enabled:          { type: boolean }
        created_at:       { type: integer }
        updated_at:       { type: integer }

    CreateAgentInput:
      type: object
      required: [name]
      properties:
        name:             { type: string, minLength: 1 }
        system_prompt:    { type: string, nullable: true }

    UpdateAgentInput:
      type: object
      properties:
        name:             { type: string, minLength: 1 }
        system_prompt:    { type: string, nullable: true }
        enabled:          { type: boolean }

    # ─── 会话 ───

    Conversation:
      type: object
      required: [id, title, archived, pinned, created_at, updated_at]
      properties:
        id:               { type: string }
        title:            { type: string }
        agent_id:         { type: string, nullable: true }
        channel_id:       { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        archived:         { type: boolean }
        pinned:           { type: boolean }
        created_at:       { type: integer }
        updated_at:       { type: integer }

    ConversationSummary:
      type: object
      required: [id, title, archived, pinned, updated_at]
      description: 会话列表项，不含全部消息
      properties:
        id:               { type: string }
        title:            { type: string }
        agent_id:         { type: string, nullable: true }
        channel_id:       { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        archived:         { type: boolean }
        pinned:           { type: boolean }
        updated_at:       { type: integer }

    CreateConversationInput:
      type: object
      properties:
        title:            { type: string, default: "新会话" }
        agent_id:         { type: string, nullable: true }
        channel_id:       { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }

    UpdateConversationInput:
      type: object
      properties:
        title:            { type: string, minLength: 1 }
        agent_id:         { type: string, nullable: true }
        channel_id:       { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        archived:         { type: boolean }
        pinned:           { type: boolean }

    # ─── 消息 ───

    MessageNode:
      type: object
      required: [id, conversation_id, role, order_key, versions, created_at]
      properties:
        id:               { type: string }
        conversation_id:  { type: string }
        author_agent_id:  { type: string, nullable: true }
        role:
          type: string
          enum: [user, assistant]
        order_key:        { type: string }
        active_version_id: { type: string, nullable: true }
        versions:
          type: array
          items:
            $ref: "#/components/schemas/MessageVersion"
        created_at:       { type: integer }

    MessageVersion:
      type: object
      required: [id, node_id, status, created_at]
      description: |
        版本元数据（不含内容文本）。
        content 只在 active version 中填充，非 active 为 null。
        非 active 版本的内容通过 GET /versions/{versionId}/content 按需加载。
      properties:
        id:               { type: string }
        node_id:          { type: string }
        content:
          type: string
          nullable: true
          description: 仅 active version 填充，非 active 为 null
        status:
          type: string
          enum: [generating, committed, failed, cancelled]
        model_name:       { type: string, nullable: true }
        prompt_tokens:    { type: integer, nullable: true }
        completion_tokens: { type: integer, nullable: true }
        finish_reason:    { type: string, nullable: true }
        created_at:       { type: integer }

    VersionContent:
      type: object
      required: [version_id, content, content_type]
      properties:
        version_id:       { type: string }
        content:          { type: string, description: "所有 chunks 拼接后的完整文本" }
        content_type:     { type: string, example: "text/plain" }

    # ─── 生成控制 ───

    SendMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: 用户消息正文
        stream:
          type: boolean
          default: true
          description: 是否流式返回（通过 Tauri Channel 推送 chunk）
        dry_run:
          type: boolean
          default: false
          description: 仅组装 prompt 并返回调试信息，不调用 AI，不创建消息

    SendMessageResult:
      type: object
      required: [user_node_id, user_version_id, assistant_node_id, assistant_version_id]
      properties:
        user_node_id:        { type: string }
        user_version_id:     { type: string }
        assistant_node_id:   { type: string }
        assistant_version_id: { type: string }

    DryRunResult:
      type: object
      required: [messages, total_tokens_estimate]
      properties:
        messages:
          type: array
          description: 组装好的完整 prompt messages
          items:
            type: object
            properties:
              role: { type: string }
              content: { type: string }
        total_tokens_estimate:
          type: integer
          description: 估算的 token 数量
        model:
          type: string
          description: 将要调用的 model_id

    RerollInput:
      type: object
      properties:
        stream:
          type: boolean
          default: true

    RerollResult:
      type: object
      required: [assistant_node_id, assistant_version_id]
      properties:
        new_user_version_id:
          type: string
          nullable: true
          description: user node reroll 时创建的新 user version
        assistant_node_id:   { type: string }
        assistant_version_id: { type: string }

    DeleteVersionResult:
      type: object
      required: [node_deleted]
      properties:
        node_deleted:
          type: boolean
          description: true 表示该版本是最后一个，node 也被删除
        new_active_version_id:
          type: string
          nullable: true
          description: 切换后的新 active version（node_deleted=true 时为 null）

    # ─── Tauri Channel 事件 ───

    GenerationEvent:
      description: 通过 Tauri Channel 推送的生成事件（非 HTTP 响应）
      oneOf:
        - $ref: "#/components/schemas/GenerationChunk"
        - $ref: "#/components/schemas/GenerationCompleted"
        - $ref: "#/components/schemas/GenerationFailed"
        - $ref: "#/components/schemas/GenerationCancelled"
        - $ref: "#/components/schemas/GenerationEmptyRollback"

    GenerationChunk:
      type: object
      required: [type, conversation_id, node_id, version_id, delta]
      properties:
        type:             { type: string, enum: [chunk] }
        conversation_id:  { type: string }
        node_id:          { type: string }
        version_id:       { type: string }
        delta:            { type: string }

    GenerationCompleted:
      type: object
      required: [type, conversation_id, node_id, version_id]
      properties:
        type:             { type: string, enum: [completed] }
        conversation_id:  { type: string }
        node_id:          { type: string }
        version_id:       { type: string }
        prompt_tokens:    { type: integer }
        completion_tokens: { type: integer }
        finish_reason:    { type: string }
        model:            { type: string }

    GenerationFailed:
      type: object
      required: [type, conversation_id, node_id, version_id, error]
      properties:
        type:             { type: string, enum: [failed] }
        conversation_id:  { type: string }
        node_id:          { type: string }
        version_id:       { type: string }
        error:            { type: string }

    GenerationCancelled:
      type: object
      required: [type, conversation_id, node_id, version_id]
      properties:
        type:             { type: string, enum: [cancelled] }
        conversation_id:  { type: string }
        node_id:          { type: string }
        version_id:       { type: string }

    GenerationEmptyRollback:
      type: object
      required: [type, conversation_id, node_id, node_deleted]
      properties:
        type:             { type: string, enum: [empty_rollback] }
        conversation_id:  { type: string }
        node_id:          { type: string }
        node_deleted:     { type: boolean }
        fallback_version_id: { type: string, nullable: true }

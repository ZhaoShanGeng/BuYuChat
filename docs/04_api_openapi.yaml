openapi: "3.0.3"
info:
  title: BuYu Internal IPC API
  version: "0.3.0"
  description: |
    BuYu 桌面客户端内部接口。
    实际调用方式为 Tauri IPC `invoke()` + `Channel<GenerationEvent>`，本文使用 REST 风格路径表达语义。
    当前文档描述的是现在代码真实使用的字段。

tags:
  - name: channels
  - name: models
  - name: agents
  - name: conversations
  - name: messages
  - name: generation
  - name: tools

paths:
  /channels:
    get:
      operationId: list_channels
      tags: [channels]
      summary: 获取渠道列表
      parameters:
        - name: include_disabled
          in: query
          required: false
          schema: { type: boolean, default: true }
      responses:
        "200":
          description: 渠道列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Channel" }
    post:
      operationId: create_channel
      tags: [channels]
      summary: 创建渠道
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChannelInput" }
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Channel" }

  /channels/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: get_channel
      tags: [channels]
      summary: 获取单个渠道
      responses:
        "200":
          description: 渠道详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Channel" }
        "404": { $ref: "#/components/responses/ApiErrorResponse" }
    patch:
      operationId: update_channel
      tags: [channels]
      summary: 更新渠道
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateChannelInput" }
      responses:
        "200":
          description: 更新后的渠道
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Channel" }
    delete:
      operationId: delete_channel
      tags: [channels]
      summary: 删除渠道
      responses:
        "204": { description: 删除成功 }

  /channels/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: test_channel
      tags: [channels]
      summary: 测试渠道连通性
      responses:
        "200":
          description: 测试结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChannelTestResult" }
        "404": { $ref: "#/components/responses/ApiErrorResponse" }
        "502": { $ref: "#/components/responses/ApiErrorResponse" }

  /channels/{channel_id}/models:
    parameters:
      - $ref: "#/components/parameters/ChannelId"
    get:
      operationId: list_models
      tags: [models]
      summary: 获取某个渠道下的模型列表
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChannelModel" }
    post:
      operationId: create_model
      tags: [models]
      summary: 创建模型
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelInput" }
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChannelModel" }
        "409": { $ref: "#/components/responses/ApiErrorResponse" }

  /channels/{channel_id}/models/{id}:
    parameters:
      - $ref: "#/components/parameters/ChannelId"
      - $ref: "#/components/parameters/ResourceId"
    patch:
      operationId: update_model
      tags: [models]
      summary: 更新模型
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateModelInput" }
      responses:
        "200":
          description: 更新后的模型
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChannelModel" }
    delete:
      operationId: delete_model
      tags: [models]
      summary: 删除模型
      responses:
        "204": { description: 删除成功 }

  /channels/{channel_id}/models/fetch:
    parameters:
      - $ref: "#/components/parameters/ChannelId"
    post:
      operationId: fetch_remote_models
      tags: [models]
      summary: 从远程渠道拉取模型列表
      responses:
        "200":
          description: 远程模型列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RemoteModelInfo" }
        "502": { $ref: "#/components/responses/ApiErrorResponse" }

  /agents:
    get:
      operationId: list_agents
      tags: [agents]
      summary: 获取 Agent 列表
      parameters:
        - name: include_disabled
          in: query
          required: false
          schema: { type: boolean, default: true }
      responses:
        "200":
          description: Agent 列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }
    post:
      operationId: create_agent
      tags: [agents]
      summary: 创建 Agent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAgentInput" }
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /agents/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: get_agent
      tags: [agents]
      summary: 获取单个 Agent
      responses:
        "200":
          description: Agent 详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    patch:
      operationId: update_agent
      tags: [agents]
      summary: 更新 Agent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAgentInput" }
      responses:
        "200":
          description: 更新后的 Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    delete:
      operationId: delete_agent
      tags: [agents]
      summary: 删除 Agent
      responses:
        "204": { description: 删除成功 }

  /conversations:
    get:
      operationId: list_conversations
      tags: [conversations]
      summary: 获取会话列表
      parameters:
        - name: archived
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ConversationSummary" }
    post:
      operationId: create_conversation
      tags: [conversations]
      summary: 创建会话
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationInput" }
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }

  /conversations/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: get_conversation
      tags: [conversations]
      summary: 获取会话详情
      responses:
        "200":
          description: 会话详情
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
    patch:
      operationId: update_conversation
      tags: [conversations]
      summary: 更新会话
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateConversationInput" }
      responses:
        "200":
          description: 更新后的会话
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
    delete:
      operationId: delete_conversation
      tags: [conversations]
      summary: 删除会话
      responses:
        "204": { description: 删除成功 }

  /conversations/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: list_messages
      tags: [messages]
      summary: 获取会话消息列表
      parameters:
        - name: before_order_key
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 200 }
        - name: from_latest
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: 消息列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MessageNode" }

  /versions/{version_id}/content:
    parameters:
      - $ref: "#/components/parameters/VersionId"
    get:
      operationId: get_version_content
      tags: [messages]
      summary: 按需加载版本正文
      responses:
        "200":
          description: 版本正文
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionContent" }

  /conversations/{id}/nodes/{node_id}/active-version:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"
    put:
      operationId: set_active_version
      tags: [messages]
      summary: 切换 active version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id: { type: string }
      responses:
        "200": { description: 切换成功 }

  /conversations/{id}/nodes/{node_id}/versions/{version_id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"
      - $ref: "#/components/parameters/VersionId"
    delete:
      operationId: delete_version
      tags: [messages]
      summary: 删除某个版本
      responses:
        "200":
          description: 删除结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteVersionResult" }

  /conversations/{id}/send:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      operationId: send_message
      tags: [generation]
      summary: 发送消息
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageInput" }
      responses:
        "200":
          description: 已启动生成，或 dry run 返回调试信息
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/SendMessageResult" }
                  - { $ref: "#/components/schemas/DryRunResult" }

  /conversations/{id}/nodes/{node_id}/reroll:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: reroll
      tags: [generation]
      summary: 对指定楼层执行 reroll
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RerollInput" }
      responses:
        "200":
          description: reroll 结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RerollResult" }

  /conversations/{id}/nodes/{node_id}/edit:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: edit_message
      tags: [generation]
      summary: 编辑当前楼层的 active version，并可选重新发送
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EditMessageInput" }
      responses:
        "200":
          description: 编辑结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditMessageResult" }

  /generations/{version_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/VersionId"
    post:
      operationId: cancel_generation
      tags: [generation]
      summary: 取消生成
      responses:
        "200": { description: 已取消或已是终态 }

  /tools/builtin:
    get:
      operationId: list_builtin_tools
      tags: [tools]
      summary: 获取内置工具列表
      responses:
        "200":
          description: 工具列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BuiltinToolInfo" }

components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema: { type: string }
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema: { type: string }
    NodeId:
      name: node_id
      in: path
      required: true
      schema: { type: string }
    VersionId:
      name: version_id
      in: path
      required: true
      schema: { type: string }

  responses:
    ApiErrorResponse:
      description: 失败响应
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }

  schemas:
    ApiError:
      type: object
      required: [error_code, message]
      properties:
        error_code: { type: string }
        message: { type: string }
        details:
          $ref: "#/components/schemas/AppErrorDetails"
          nullable: true

    AppErrorDetails:
      type: object
      properties:
        request_url: { type: string, nullable: true }
        request_method: { type: string, nullable: true }
        request_body: { type: string, nullable: true }
        response_status: { type: integer, nullable: true }
        response_body: { type: string, nullable: true }
        raw_message: { type: string, nullable: true }

    Channel:
      type: object
      required: [id, name, channel_type, base_url, enabled, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        channel_type: { type: string }
        base_url: { type: string }
        api_key: { type: string, nullable: true }
        api_keys: { type: string, nullable: true }
        auth_type: { type: string, nullable: true }
        models_endpoint: { type: string, nullable: true }
        chat_endpoint: { type: string, nullable: true }
        stream_endpoint: { type: string, nullable: true }
        thinking_tags: { type: string, nullable: true }
        enabled: { type: boolean }
        created_at: { type: integer }
        updated_at: { type: integer }

    CreateChannelInput:
      type: object
      required: [name, base_url]
      properties:
        name: { type: string, minLength: 1 }
        base_url: { type: string, pattern: "^https?://" }
        channel_type: { type: string, nullable: true }
        api_key: { type: string, nullable: true }
        api_keys: { type: string, nullable: true }
        auth_type: { type: string, nullable: true }
        models_endpoint: { type: string, nullable: true }
        chat_endpoint: { type: string, nullable: true }
        stream_endpoint: { type: string, nullable: true }
        thinking_tags: { type: string, nullable: true }
        enabled: { type: boolean, nullable: true }

    UpdateChannelInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        base_url: { type: string, pattern: "^https?://" }
        channel_type: { type: string, nullable: true }
        api_key: { type: string, nullable: true }
        api_keys: { type: string, nullable: true }
        auth_type: { type: string, nullable: true }
        models_endpoint: { type: string, nullable: true }
        chat_endpoint: { type: string, nullable: true }
        stream_endpoint: { type: string, nullable: true }
        thinking_tags: { type: string, nullable: true }
        enabled: { type: boolean, nullable: true }

    ChannelTestResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }

    ChannelModel:
      type: object
      required: [id, channel_id, model_id]
      properties:
        id: { type: string }
        channel_id: { type: string }
        model_id: { type: string }
        display_name: { type: string, nullable: true }
        context_window: { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }
        temperature: { type: string, nullable: true }
        top_p: { type: string, nullable: true }

    CreateModelInput:
      type: object
      required: [model_id]
      properties:
        model_id: { type: string, minLength: 1 }
        display_name: { type: string, nullable: true }
        context_window: { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }
        temperature: { type: string, nullable: true }
        top_p: { type: string, nullable: true }

    UpdateModelInput:
      type: object
      properties:
        display_name: { type: string, nullable: true }
        context_window: { type: integer, nullable: true }
        max_output_tokens: { type: integer, nullable: true }
        temperature: { type: string, nullable: true }
        top_p: { type: string, nullable: true }

    RemoteModelInfo:
      type: object
      required: [model_id]
      properties:
        model_id: { type: string }
        display_name: { type: string, nullable: true }
        context_window: { type: integer, nullable: true }

    Agent:
      type: object
      required: [id, name, enabled, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        system_prompt: { type: string, nullable: true }
        avatar_uri: { type: string, nullable: true }
        enabled: { type: boolean }
        created_at: { type: integer }
        updated_at: { type: integer }

    CreateAgentInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        system_prompt: { type: string, nullable: true }

    UpdateAgentInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        system_prompt: { type: string, nullable: true }
        enabled: { type: boolean, nullable: true }

    Conversation:
      type: object
      required: [id, title, archived, pinned, created_at, updated_at]
      properties:
        id: { type: string }
        title: { type: string }
        agent_id: { type: string, nullable: true }
        channel_id: { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        archived: { type: boolean }
        pinned: { type: boolean }
        enabled_tools: { type: string, nullable: true }
        created_at: { type: integer }
        updated_at: { type: integer }

    ConversationSummary:
      type: object
      required: [id, title, archived, pinned, updated_at]
      properties:
        id: { type: string }
        title: { type: string }
        agent_id: { type: string, nullable: true }
        channel_id: { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        archived: { type: boolean }
        pinned: { type: boolean }
        enabled_tools: { type: string, nullable: true }
        updated_at: { type: integer }

    CreateConversationInput:
      type: object
      properties:
        title: { type: string, nullable: true }
        agent_id: { type: string, nullable: true }
        channel_id: { type: string, nullable: true }
        channel_model_id: { type: string, nullable: true }
        enabled_tools:
          type: array
          nullable: true
          items: { type: string }

    UpdateConversationInput:
      type: object
      properties:
        title: { type: string, nullable: true }
        agent_id_set: { type: boolean, default: false }
        agent_id: { type: string, nullable: true }
        channel_id_set: { type: boolean, default: false }
        channel_id: { type: string, nullable: true }
        channel_model_id_set: { type: boolean, default: false }
        channel_model_id: { type: string, nullable: true }
        archived: { type: boolean, nullable: true }
        pinned: { type: boolean, nullable: true }
        enabled_tools_set: { type: boolean, default: false }
        enabled_tools:
          type: array
          nullable: true
          items: { type: string }

    ImageAttachment:
      type: object
      required: [base64, mime_type]
      properties:
        base64: { type: string }
        mime_type: { type: string }
        url: { type: string, nullable: true }

    FileAttachment:
      type: object
      required: [name, base64, mime_type]
      properties:
        name: { type: string }
        base64: { type: string }
        mime_type: { type: string }

    ToolCallRecord:
      type: object
      required: [id, name, arguments_json]
      properties:
        id: { type: string }
        name: { type: string }
        arguments_json: { type: string }

    ToolResultRecord:
      type: object
      required: [tool_call_id, name, content, is_error]
      properties:
        tool_call_id: { type: string }
        name: { type: string }
        content: { type: string }
        is_error: { type: boolean }

    ToolCallDelta:
      type: object
      required: [arguments_delta, index]
      properties:
        id: { type: string, nullable: true }
        name: { type: string, nullable: true }
        arguments_delta: { type: string }
        index: { type: integer }

    MessageNode:
      type: object
      required: [id, conversation_id, role, order_key, versions, created_at]
      properties:
        id: { type: string }
        conversation_id: { type: string }
        author_agent_id: { type: string, nullable: true }
        role:
          type: string
          enum: [user, assistant]
        order_key: { type: string }
        active_version_id: { type: string, nullable: true }
        versions:
          type: array
          items: { $ref: "#/components/schemas/MessageVersion" }
        created_at: { type: integer }

    MessageVersion:
      type: object
      required: [id, node_id, status, created_at]
      properties:
        id: { type: string }
        node_id: { type: string }
        content: { type: string, nullable: true }
        thinking_content: { type: string, nullable: true }
        images:
          type: array
          items: { $ref: "#/components/schemas/ImageAttachment" }
        files:
          type: array
          items: { $ref: "#/components/schemas/FileAttachment" }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolCallRecord" }
        tool_results:
          type: array
          items: { $ref: "#/components/schemas/ToolResultRecord" }
        status:
          type: string
          enum: [generating, committed, failed, cancelled]
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        error_details:
          $ref: "#/components/schemas/AppErrorDetails"
          nullable: true
        model_name: { type: string, nullable: true }
        prompt_tokens: { type: integer, nullable: true }
        completion_tokens: { type: integer, nullable: true }
        finish_reason: { type: string, nullable: true }
        received_at: { type: integer, nullable: true }
        completed_at: { type: integer, nullable: true }
        created_at: { type: integer }

    VersionContent:
      type: object
      required: [version_id, content, content_type]
      properties:
        version_id: { type: string }
        content: { type: string }
        content_type: { type: string }

    SendMessageInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        images:
          type: array
          items: { $ref: "#/components/schemas/ImageAttachment" }
        files:
          type: array
          items: { $ref: "#/components/schemas/FileAttachment" }
        tool_results:
          type: array
          items: { $ref: "#/components/schemas/ToolResultRecord" }
        stream: { type: boolean, nullable: true }
        dry_run: { type: boolean, nullable: true }

    SendMessageResult:
      type: object
      required: [user_node_id, user_version_id, assistant_node_id, assistant_version_id]
      properties:
        user_node_id: { type: string }
        user_version_id: { type: string }
        assistant_node_id: { type: string }
        assistant_version_id: { type: string }

    DryRunPromptMessage:
      type: object
      required: [role, content, images, files, tool_calls, tool_results]
      properties:
        role: { type: string }
        content: { type: string }
        images:
          type: array
          items: { $ref: "#/components/schemas/ImageAttachment" }
        files:
          type: array
          items: { $ref: "#/components/schemas/FileAttachment" }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolCallRecord" }
        tool_results:
          type: array
          items: { $ref: "#/components/schemas/ToolResultRecord" }

    DryRunResult:
      type: object
      required: [messages, total_tokens_estimate, model]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/DryRunPromptMessage" }
        total_tokens_estimate: { type: integer }
        model: { type: string }

    RerollInput:
      type: object
      properties:
        stream: { type: boolean, nullable: true }

    RerollResult:
      type: object
      required: [assistant_node_id, assistant_version_id]
      properties:
        new_user_version_id: { type: string, nullable: true }
        assistant_node_id: { type: string }
        assistant_version_id: { type: string }

    EditMessageInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        resend: { type: boolean, nullable: true }
        stream: { type: boolean, nullable: true }

    EditMessageResult:
      type: object
      required: [edited_version_id]
      properties:
        edited_version_id: { type: string }
        assistant_node_id: { type: string, nullable: true }
        assistant_version_id: { type: string, nullable: true }

    DeleteVersionResult:
      type: object
      required: [node_deleted]
      properties:
        node_deleted: { type: boolean }
        new_active_version_id: { type: string, nullable: true }

    BuiltinToolInfo:
      type: object
      required: [name, description]
      properties:
        name: { type: string }
        description: { type: string }

    GenerationEvent:
      oneOf:
        - { $ref: "#/components/schemas/GenerationChunk" }
        - { $ref: "#/components/schemas/GenerationCompleted" }
        - { $ref: "#/components/schemas/GenerationFailed" }
        - { $ref: "#/components/schemas/GenerationCancelled" }
        - { $ref: "#/components/schemas/GenerationEmptyRollback" }
        - { $ref: "#/components/schemas/GenerationToolCallStart" }
        - { $ref: "#/components/schemas/GenerationToolResult" }

    GenerationChunk:
      type: object
      required: [type, conversation_id, node_id, version_id, delta, tool_call_deltas]
      properties:
        type: { type: string, enum: [chunk] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }
        delta: { type: string }
        reasoning_delta: { type: string, nullable: true }
        tool_call_deltas:
          type: array
          items: { $ref: "#/components/schemas/ToolCallDelta" }

    GenerationCompleted:
      type: object
      required: [type, conversation_id, node_id, version_id, prompt_tokens, completion_tokens, finish_reason, model, received_at, completed_at]
      properties:
        type: { type: string, enum: [completed] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        finish_reason: { type: string }
        model: { type: string }
        received_at: { type: integer }
        completed_at: { type: integer }

    GenerationFailed:
      type: object
      required: [type, conversation_id, node_id, version_id, error_code, error_message]
      properties:
        type: { type: string, enum: [failed] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }
        error_code: { type: string }
        error_message: { type: string }
        error_details:
          $ref: "#/components/schemas/AppErrorDetails"
          nullable: true

    GenerationCancelled:
      type: object
      required: [type, conversation_id, node_id, version_id]
      properties:
        type: { type: string, enum: [cancelled] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }

    GenerationEmptyRollback:
      type: object
      required: [type, conversation_id, node_id, node_deleted]
      properties:
        type: { type: string, enum: [empty_rollback] }
        conversation_id: { type: string }
        node_id: { type: string }
        node_deleted: { type: boolean }
        fallback_version_id: { type: string, nullable: true }

    GenerationToolCallStart:
      type: object
      required: [type, conversation_id, node_id, version_id, tool_calls]
      properties:
        type: { type: string, enum: [tool_call_start] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolCallRecord" }

    GenerationToolResult:
      type: object
      required: [type, conversation_id, node_id, version_id, results]
      properties:
        type: { type: string, enum: [tool_result] }
        conversation_id: { type: string }
        node_id: { type: string }
        version_id: { type: string }
        results:
          type: array
          items: { $ref: "#/components/schemas/ToolResultRecord" }
